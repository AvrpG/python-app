name: cicd

on:
  push:
    paths:
      - src/**
      - .github/workflows/cicd.yaml
    branches:
      - master

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      -
        name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Extract short SHA
        run: |
          echo "SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-6)" >> $GITHUB_ENV

      -
        uses: actions/checkout@v3

      -
        name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: avijolite/python-app:${{ env.SHORT_SHA }}

      - 
        name: Update image tag in values.yaml
        uses: fjogeleit/yaml-update-action@main
        with:
          valueFile: 'charts/python-app/values.yaml'
          propertyPath: 'image.tag'
          value: ${{ env.SHORT_SHA }}
          branch: update-image-tag/${{ github.sha }}
          targetBranch: master
          createPR: false
          message: 'Update image tag to ${{ env.SHORT_SHA }}'
          token: ${{ secrets.TOKEN_GITHUB }}
          commitUserName: github-actions[bot]
          commitUserEmail: github-actions[bot]@users.noreply.github.com
  
  cd:
    runs-on: self-hosted
    needs: ci
    steps:
      -
        name: install ArgoCD cli
        run: |
          curl -ksSL -o argocd-linux-amd64 https://argocd-server.argocd/download/argocd-linux-amd64
          chmod +x argocd-linux-amd64
          sudo mv argocd-linux-amd64 /usr/local/bin/argocd
          argocd version --client

      -
        name: sync ArgoCD application
        run: |
          argocd login argocd-server.argocd \
           --insecure \
           --username ${{ vars.ARGOCD_USERNAME }} \
           --password ${{ secrets.ARGOCD_PASSWORD }} \
           --grpc-web
          argocd app sync python-app